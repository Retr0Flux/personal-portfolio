<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cal Barseghian — Photography</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="#/" class="nav-logo">Cal Barseghian</a>
    <div class="nav-links">
      <a href="#/" data-nav="home">Home</a>
      <a href="#/albums" data-nav="albums">Albums</a>
      <a href="#/contact" data-nav="contact">Contact</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Home -->
  <main id="view-home" class="view">
    <section class="hero">
      <div class="hero-content">
        <h1 class="reveal">Cal Barseghian</h1>
        <p class="hero-subtitle reveal">Automotive Photographer</p>
        <p class="hero-tagline reveal">Capturing the beauty, power, and design of automobiles.</p>
      </div>
    </section>
    <section class="section">
      <h2 class="section-title reveal">Featured Work</h2>
      <div id="featured-grid" class="photo-grid"></div>
    </section>
  </main>

  <!-- Albums -->
  <main id="view-albums" class="view" hidden>
    <section class="section">
      <h1 class="section-title reveal">Albums</h1>
      <div id="albums-grid" class="albums-grid"></div>
    </section>
  </main>

  <!-- Single Album -->
  <main id="view-album" class="view" hidden>
    <section class="section">
      <a href="#/albums" class="back-link reveal">&larr; All Albums</a>
      <h1 id="album-title" class="section-title reveal"></h1>
      <p id="album-description" class="section-desc reveal"></p>
      <div id="album-grid" class="photo-grid"></div>
    </section>
  </main>

  <!-- Contact -->
  <main id="view-contact" class="view" hidden>
    <section class="section contact-section">
      <h1 class="section-title reveal">Get in Touch</h1>
      <p class="section-desc reveal">Interested in working together? Send me a message.</p>
      <form id="contact-form" class="reveal">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Jane Doe">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="jane@example.com">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Tell me about your project..."></textarea>
        <button type="submit">Send Message</button>
      </form>
      <p id="form-status" class="form-status" hidden></p>
    </section>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&#8249;</button>
    <button class="lightbox-next" aria-label="Next">&#8250;</button>
    <img id="lightbox-img" src="" alt="">
    <span id="lightbox-counter" class="lightbox-counter"></span>
  </div>

  <footer>
    <div class="social-links">
      <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
      <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
    </div>
    <p>&copy; 2026 Cal Barseghian</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
